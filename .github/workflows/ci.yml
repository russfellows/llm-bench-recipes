name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-lint:
    name: ruff (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool run ruff check .

  shell-lint:
    name: bash syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n (syntax only, all scripts)
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            bash -n "$f" || fail=1
          done < <(find . -name "*.sh" -print0)
          exit "$fail"
      - name: shellcheck (warning severity and above)
        run: |
          command -v shellcheck >/dev/null || sudo apt-get update && sudo apt-get install -y shellcheck
          find . -name "*.sh" -print0 | xargs -0 shellcheck -S warning

  recipe-validate:
    name: validate recipe TOMLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: parse + schema-load every recipe/variant
        run: |
          set -e
          for toml in recipes/*/recipe.toml; do
            variants=$(uv run --script recipes/_common/list_variants.py "$toml")
            for variant in $variants; do
              echo "==> $toml :: $variant"
              uv run --script recipes/_common/load_recipe.py "$toml" "$variant" > /dev/null
            done
          done

  repo-invariants:
    name: repo invariants (CLAUDE.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: no YAML outside .github/ (repo is YAML-free by design)
        run: |
          stray=$(find . -type f \( -name "*.yml" -o -name "*.yaml" \) -not -path "./.github/*")
          if [ -n "$stray" ]; then
            echo "YAML files found outside .github/ (repo hard invariant: no YAML):"
            echo "$stray"
            exit 1
          fi
      - name: no floating :latest image tags in recipes
        run: |
          hits=$(grep -nE '^\s*image\s*=.*:latest' recipes/*/recipe.toml || true)
          if [ -n "$hits" ]; then
            echo "Recipe 'image' fields must be pinned (digest or specific tag), not :latest:"
            echo "$hits"
            exit 1
          fi
      - name: VERSION file exists and is valid semver
        run: |
          if [ ! -f VERSION ]; then
            echo "Missing top-level VERSION file."
            exit 1
          fi
          v="$(cat VERSION)"
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be a plain semver string (X.Y.Z), got: '$v'"
            exit 1
          fi
          echo "VERSION: $v"
