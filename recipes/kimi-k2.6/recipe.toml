port    = 8000

server_entrypoint = "vllm serve"
server_args = [
  "amd/Kimi-K2.6-MXFP4",
  "--host", "0.0.0.0",
  "--port", "8000",
  "--tensor-parallel-size", "@TP@",
  "--trust-remote-code",
  "--max-model-len", "16384",
  "--max-num-seqs", "512",
  "--max-num-batched-tokens", "65536",
  "--reasoning-parser", "kimi_k2",
  "--tool-call-parser", "kimi_k2",
  "--enable-auto-tool-choice",
  "--gpu-memory-utilization", "0.9",
  "--mm-encoder-tp-mode", "data",
  "--attention-backend", "ROCM_AITER_MLA",
  "--block-size", "1",
  "--kv-cache-dtype", "fp8",
  "--safetensors-load-strategy", "prefetch",
  "--compilation-config",
  '{"pass_config":{"fuse_allreduce_rms":true,"eliminate_noops":true,"fuse_rope_kvcache_cat_mla":true},"custom_ops":["none","+rms_norm"],"compile_ranges_endpoints":[64],"cudagraph_mode":"full_and_piecewise","use_inductor_graph_partition":true}',
