# ----- NVIDIA / vLLM (NVFP4) -------------------------------------------------
[variants.nvidia_vllm]
vendor           = "nvidia"
stack            = "vllm"
model_id         = "nvidia/Kimi-K2.6-NVFP4"
image            = "vllm/vllm-openai:v0.21.0"
port             = 8000
bench_extra_args = ["--trust-remote-code"]

server_entrypoint = "vllm serve"
server_args = [
  "nvidia/Kimi-K2.6-NVFP4",
  "--host", "0.0.0.0",
  "--port", "8000",
  "--tensor-parallel-size", "@TP@",
  "--trust-remote-code",
  "--gpu-memory-utilization", "0.90",
  "--max-model-len", "16384",
  "--max-num-seqs", "512",
  "--reasoning-parser", "kimi_k2",
  "--tool-call-parser", "kimi_k2",
  "--kv-cache-dtype", "fp8",
  "--safetensors-load-strategy", "prefetch",
  "--max-cudagraph-capture-size", "2048",
  "--stream-interval", "20",
  "--compilation-config", '{"pass_config":{"fuse_allreduce_rms":true}}',
]

[variants.nvidia_vllm.env]
TORCH_CUDA_ARCH_LIST    = "10.0"
PYTHONNOUSERSITE        = "1"
VLLM_CACHE_ROOT         = "${SHARED_ROOT}/vllm_cache"
TORCHINDUCTOR_CACHE_DIR = "${SHARED_ROOT}/torch_compile_cache"
