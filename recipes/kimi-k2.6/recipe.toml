# Useful when you want to reproduce the model-card build recipe as closely
# as possible. Not reproducible over time: both the base image tag and the
# amd-quark `main` ref move.
[variants.amd_vllm_quark]
vendor           = "amd"
stack            = "vllm"
model_id         = "amd/Kimi-K2.6-MXFP4"
bench_extra_args = ["--trust-remote-code"]
